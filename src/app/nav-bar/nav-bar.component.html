<header class="header1">
  <div class="header-container">
    <!-- Logo -->
    <a href="#home" class="logo">
      <span class="logo-text">SKM</span>Profile
    </a>

    <!-- Desktop Navigation -->
    <nav class="navbar desktop-nav">
      <a href="#home" class="nav-link">Home</a>
      <a href="#skill" class="nav-link">Skills</a>
      <a href="#about" class="nav-link">About</a>
      <a href="#education" class="nav-link">Education</a>
    </nav>

    <!-- Mobile Menu Toggle Button -->
    <button 
      class="hamburger" 
      (click)="toggleMobileMenu()"
      [class.active]="mobileMenuOpen"
      aria-label="Toggle mobile menu">
      <span class="hamburger-line"></span>
      <span class="hamburger-line"></span>
      <span class="hamburger-line"></span>
    </button>
  </div>

  <!-- Mobile Navigation Menu -->
  <nav class="mobile-nav" [class.open]="mobileMenuOpen" *ngIf="isMobile">
    <a href="#home" class="mobile-nav-link" (click)="closeMobileMenu()">Home</a>
    <a href="#skill" class="mobile-nav-link" (click)="closeMobileMenu()">Skills</a>
    <a href="#about" class="mobile-nav-link" (click)="closeMobileMenu()">About</a>
    <a href="#education" class="mobile-nav-link" (click)="closeMobileMenu()">Education</a>
  </nav>
</header>
