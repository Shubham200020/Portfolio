<section class="projects-section" id="projects">
  <div class="section-heading">
    <h2>Featured Projects</h2>
    <p>Selection of my recent full-stack development work</p>
  </div>

  <div class="projects-grid">
    <div class="project-card" *ngFor="let project of projects">
      <div class="project-image">
        <img [src]="project.image" [alt]="project.title">
        <div class="project-overlay">
          <div class="overlay-content">
            <h4>Key Features</h4>
            <ul>
              <li *ngFor="let feature of project.features">{{ feature }}</li>
            </ul>
          </div>
        </div>
      </div>
      
      <div class="project-content">
        <div class="tech-stack">
          <span class="tech-badge" *ngFor="let t of project.tech">{{ t }}</span>
        </div>
        <h3>{{ project.title }}</h3>
        <p>{{ project.description }}</p>
        
        <div class="project-links">
          <a [href]="project.links.live" target="_blank" class="btn-project" *ngIf="project.links.live">
            View Live <i class="fas fa-external-link-alt"></i>
          </a>
          <a [href]="project.links.github" target="_blank" class="btn-details" *ngIf="project.links.github">
            GitHub <i class="fab fa-github"></i>
          </a>
          <a [href]="project.links.frontend" target="_blank" class="btn-details" *ngIf="project.links.frontend">
            Frontend <i class="fab fa-angular"></i>
          </a>
          <a [href]="project.links.backend" target="_blank" class="btn-details" *ngIf="project.links.backend">
            Backend <i class="fas fa-code"></i>
          </a>
        </div>
      </div>
    </div>
  </div>
</section>
